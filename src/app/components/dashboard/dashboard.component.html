<app-navbar></app-navbar>

<div class="dashboard-container">
  <div class="welcome-banner">
    <div class="banner-icon">🅿️</div>
    <div>
      <h1>Welcome back, <span class="name">{{ username }}</span>!</h1>
      <p>Find and book your perfect parking space today.</p>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-icon">🚗</span>
      <div class="stat-info">
        <span class="stat-value">0</span>
        <span class="stat-label">Active Bookings</span>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">📋</span>
      <div class="stat-info">
        <span class="stat-value">0</span>
        <span class="stat-label">Past Bookings</span>
      </div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">⭐</span>
      <div class="stat-info">
        <span class="stat-value">0</span>
        <span class="stat-label">Saved Spaces</span>
      </div>
    </div>
  </div>

  <div class="quick-actions">
    <h2>Quick Actions</h2>
    <div class="action-cards">
      <div class="action-card">
        <span class="action-icon">🔍</span>
        <span>Find Parking</span>
      </div>
      <div class="action-card">
        <span class="action-icon">🏠</span>
        <span>Rent Your Space</span>
      </div>
      <div class="action-card">
        <span class="action-icon">📍</span>
        <span>View Map</span>
      </div>
    </div>
  </div>
</div>
